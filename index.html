<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Florería</title>

<style>
*{box-sizing:border-box;font-family:Segoe UI;margin:0;padding:0}

body{
height:100vh;
background:linear-gradient(120deg,#ff758c,#ff7eb3,#f6d365,#fda085);
background-size:400% 400%;
animation:fondo 12s ease infinite;
}

@keyframes fondo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

#login{height:100vh;display:flex;justify-content:center;align-items:center}
.card{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:18px;
width:370px;
text-align:center;
box-shadow:0 15px 35px rgba(0,0,0,.35)
}
.card img{width:130px;margin-bottom:15px}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s
}

button:hover{background:#d63384;transform:scale(1.03)}

#error{color:red;margin-top:10px}

#dashboard{
display:none;
height:100vh;
background:linear-gradient(135deg,#f6d365,#fda085,#ff9a9e,#fecfef);
background-size:400% 400%;
animation:fondo 15s ease infinite
}

.header{
background:#ff4d6d;
color:white;
padding:16px;
text-align:center;
font-size:22px;
font-weight:bold
}

.container{display:flex;height:calc(100vh - 60px)}

.sidebar{
width:240px;
background:#2c2c2c;
color:white;
padding:20px
}

.sidebar button{
width:100%;
margin:6px 0;
background:#444;
font-size:15px
}

.sidebar button:hover{
background:#ff4d6d
}

.main{
flex:1;
padding:30px;
overflow:auto
}

.section{display:none}
.section.active{display:block}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px
}

.box{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
text-align:center
}

.table{width:100%;margin-top:15px;border-collapse:collapse;background:white}
.table th,.table td{border:1px solid #ddd;padding:10px}
.table th{background:#ff4d6d;color:white}

ul{margin-top:10px}
li{margin:6px 0}
</style>
</head>

<body>

<div id="login">
<div class="card">
<img src="https://tse1.mm.bing.net/th/id/OIP.wVpc1CJUv_CzfKjXU06X5AHaEs?rs=1&pid=ImgDetMain&o=7&rm=3">
<h2>Florería Primavera</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<p id="error"></p>
</div>
</div>

<div id="dashboard">

<div class="header">🌸 Sistema de Gestión de Florería</div>

<div class="container">

<div class="sidebar">
<button onclick="show('ventas')">📊 Ventas</button>
<button onclick="show('clientes')">👤 Clientes</button>
<button onclick="show('flores')">🌷 Registrar venta</button>
<button onclick="show('agenda')">📅 Flores agendadas</button>
<button onclick="show('entregas')">🚚 Por entregar</button>
<button onclick="show('personal')">👨‍💼 Personal</button>
<button onclick="show('mensajes')">💬 Mensajes</button>
<button onclick="show('pagos')">💳 Pagos</button>
</div>

<div class="main">

<div id="ventas" class="section active">
<h2>Ventas del día</h2>
<div class="grid">
<div class="box">💐 Ramos vendidos<br><b id="vendidos">0</b></div>
<div class="box">🚚 Pendientes<br><b id="pendientes">0</b></div>
</div>
</div>

<div id="clientes" class="section">
<input id="clienteNombre" placeholder="Nombre cliente">
<button onclick="agregarCliente()">Añadir cliente</button>
<table class="table" id="tablaClientes">
<tr><th>Cliente</th><th>Acción</th></tr>
</table>
</div>

<div id="flores" class="section">
<select id="florSeleccion">
<option>🌹 Rosas</option>
<option>🌷 Tulipanes</option>
<option>🌻 Girasoles</option>
</select>
<button onclick="venderFlor()">Registrar venta</button>
</div>

<div id="agenda" class="section"><h2>Agenda</h2></div>

<div id="entregas" class="section">
<ul id="listaEntregas"></ul>
</div>

<div id="personal" class="section"><h2>Personal</h2></div>

<div id="mensajes" class="section">
<h2>Mensajes</h2>
<textarea style="width:100%;height:100px"></textarea>
<button>Enviar mensaje</button>
</div>

<div id="pagos" class="section">
<h2>Pagos</h2>
<input placeholder="Monto">
<select>
<option>Efectivo</option>
<option>Tarjeta</option>
<option>Transferencia</option>
</select>
<button onclick="pagar()">Procesar pago</button>
</div>

</div>
</div>
</div>

<script>

let vendidos=0
let pendientes=0
let esAdmin=false

function login(){

let user=document.getElementById('user').value.trim()
let pass=document.getElementById('pass').value.trim()

if((user==='florista' && pass==='rosas2026') || (user==='admin' && pass==='admin123')){
esAdmin=true
entrar()
}

else if(user==='cliente' && pass==='cliente'){
esAdmin=false
entrar()
}

else{
document.getElementById('error').innerText='Usuario o contraseña incorrectos'
}

}

function entrar(){

document.getElementById('login').style.display='none'
document.getElementById('dashboard').style.display='block'

// 🔒 OCULTAR SOLO FUNCIONES ADMIN
if(!esAdmin){

document.querySelector("button[onclick=\"show('ventas')\"]").style.display='none'
document.querySelector("button[onclick=\"show('clientes')\"]").style.display='none'
document.querySelector("button[onclick=\"show('agenda')\"]").style.display='none'
document.querySelector("button[onclick=\"show('entregas')\"]").style.display='none'

// 💳 PAGOS YA NO SE OCULTA

}

}

function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

function agregarCliente(){

if(!esAdmin){
alert("❌ Solo admin")
return
}

let nombre=document.getElementById('clienteNombre').value
if(nombre==='') return

let tabla=document.getElementById('tablaClientes')
let row=tabla.insertRow()

row.insertCell(0).innerText=nombre

let btn=document.createElement('button')
btn.innerText='Eliminar'
btn.onclick=function(){row.remove()}

row.insertCell(1).appendChild(btn)

}

function venderFlor(){

let flor=document.getElementById('florSeleccion').value

let li=document.createElement('li')
li.innerText=flor

document.getElementById('listaEntregas').appendChild(li)

vendidos++
pendientes++

document.getElementById('vendidos').innerText=vendidos
document.getElementById('pendientes').innerText=pendientes

}

// 💳 TODOS PUEDEN PAGAR
function pagar(){
alert("✅ Pago realizado correctamente")
}

</script>

</body>
</html>
